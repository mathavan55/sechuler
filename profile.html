<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TaskFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="app-page">
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-brand">
            <h1>TaskFlow</h1>
        </div>
        <div class="nav-links">
            <a href="scheduler.html" class="nav-link">Schedule</a>
            <a href="monthly.html" class="nav-link">Monthly</a>
            <a href="media.html" class="nav-link">Media</a>
        </div>
        <div class="nav-profile">
            <button class="profile-btn active">
                <div class="avatar-placeholder" id="navAvatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <span id="navUsername">User</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="profile-main">
        <div class="profile-container">
            <!-- Profile Card -->
            <div class="profile-card">
                <div class="profile-avatar">
                    <div class="avatar-large" id="profileAvatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <button class="btn-change-avatar" onclick="document.getElementById('avatarInput').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </button>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="handleAvatarChange(event)">
                </div>
                <h2 id="profileName">Loading...</h2>
                <p id="profileEmail">@username</p>
                <p class="member-since">Member since <span id="memberSince">2024</span></p>
            </div>

            <!-- Stats Cards -->
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-icon tasks-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalTasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon completed-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M9 12l2 2 4-4"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="completedTasks">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon rate-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20V10"/>
                            <path d="M18 20V4"/>
                            <path d="M6 20v-4"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="completionRate">0%</span>
                        <span class="stat-label">Completion Rate</span>
                    </div>
                </div>
            </div>

            <!-- Edit Profile Form -->
            <div class="edit-profile-section">
                <h3>Edit Profile</h3>
                <form id="profileForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Your email">
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" readonly>
                    </div>
                    <button type="submit" class="btn-primary btn-full">
                        <span>Save Changes</span>
                    </button>
                </form>
            </div>

            <!-- Danger Zone -->
            <div class="danger-zone">
                <h3>Danger Zone</h3>
                <button class="btn-danger" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Sign Out</span>
                </button>
            </div>
        </div>
    </main>

    <div id="toast" class="toast"></div>
    
    <script src="js/profile.js"></script>
</body>
</html>
