<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Journal - TaskFlow</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="app-page">
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-brand">
            <h1>TaskFlow</h1>
        </div>
        <div class="nav-links">
            <a href="scheduler.html" class="nav-link">Schedule</a>
            <a href="monthly.html" class="nav-link">Monthly</a>
            <a href="media.html" class="nav-link active">Media</a>
        </div>
        <div class="nav-profile">
            <button class="profile-btn" onclick="window.location.href='profile.html'">
                <div class="avatar-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <span id="navUsername">User</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="media-main">
        <!-- Filter Section -->
        <div class="media-filter">
            <div class="filter-group">
                <label for="mediaDate">Select Date:</label>
                <input type="date" id="mediaDate" onchange="loadMedia()">
            </div>
            <button class="btn-add-media" onclick="openUploadModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span>Upload</span>
            </button>
        </div>

        <!-- Media Grid -->
        <div class="media-section">
            <h3 id="mediaSectionTitle">Today's Journal</h3>
            <div class="media-grid" id="mediaGrid">
                <!-- Media items will be rendered here -->
            </div>
            <div class="empty-state" id="emptyMedia">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
                <p>No media for this date</p>
                <button class="btn-secondary" onclick="openUploadModal()">Add your first entry</button>
            </div>
        </div>
    </main>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Upload Media</h2>
                <button class="modal-close" onclick="closeUploadModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="uploadForm" class="modal-body">
                <div class="form-group">
                    <label for="uploadDate">Date</label>
                    <input type="date" id="uploadDate" required>
                </div>
                
                <div class="form-group">
                    <label for="mediaType">Type</label>
                    <select id="mediaType" onchange="toggleUploadFields()">
                        <option value="text">Text Note</option>
                        <option value="image">Image</option>
                        <option value="video">Video</option>
                    </select>
                </div>
                
                <div class="form-group" id="textContentGroup">
                    <label for="textContent">Note Content</label>
                    <textarea id="textContent" rows="4" placeholder="Write your thoughts..."></textarea>
                </div>
                
                <div class="form-group" id="fileUploadGroup" style="display: none;">
                    <label for="mediaFile">File</label>
                    <div class="file-upload-zone" id="dropZone">
                        <input type="file" id="mediaFile" accept="image/*,video/*" onchange="handleFileSelect(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p>Drag & drop or click to upload</p>
                        <span id="fileName"></span>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeUploadModal()">Cancel</button>
                    <button type="submit" class="btn-primary">
                        <span>Upload</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal preview-modal">
            <button class="modal-close" onclick="closePreviewModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="preview-content" id="previewContent">
                <!-- Preview content will be rendered here -->
            </div>
            <div class="preview-info" id="previewInfo">
                <p id="previewName"></p>
                <button class="btn-danger btn-small" onclick="deleteMediaItem()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Delete
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    
    <script src="js/media.js"></script>
</body>
</html>
